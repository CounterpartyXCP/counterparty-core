# cargo-audit configuration for the Counterparty client.
#
# Single source of truth for the advisories `cargo audit` ignores, so the CI
# invocation (`cargo audit --deny warnings`) carries no inline `--ignore` flag
# that could silently drift from this list. cargo-deny reads the equivalent
# ignore from deny.toml; keep the two lists in sync when triaging a new advisory.
[advisories]
ignore = [
    # bincode 1.3.3 is pulled in transitively by syntect (JSON->YAML output
    # highlighting) and is flagged unmaintained. No security impact; tracked for
    # removal by dropping/replacing syntect's default feature set. See deny.toml.
    "RUSTSEC-2025-0141",
]
