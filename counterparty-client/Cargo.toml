[package]
name = "counterparty-client"
version = "11.2.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5.36", features = ["derive", "cargo"] }
config = "0.13"
# rustls (not native-tls/OpenSSL): no system OpenSSL dependency across
# macOS/Linux/Windows, and drops the OpenSSL RUSTSEC advisory.
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
hex = "0.4.3"
bitcoin = "0.32.5"
bip39 = { version = "2.0.0", features = ["zeroize"] }
cocoon = "0.4.0"
thiserror = "1.0"
lazy_static = "1.4.0"
serde_yaml = "0.9.3"
# Only the local JSON->YAML syntax highlighting in helpers.rs is used, so drop
# syntect's default features. This removes the `plist-load`/`yaml-load` features
# and their transitive `plist` -> `quick-xml` and `yaml-rust` deps (all flagged
# by cargo-audit), and swaps the C `onig` regex engine for pure-Rust fancy-regex.
syntect = { version = "5.2.0", default-features = false, features = [
    "default-syntaxes",
    "default-themes",
    "regex-fancy",
] }
termcolor = "1.4.1"
dirs = "5.0"
toml = "0.8.20"
rand = "0.8.5"
rpassword = "7.2.0"
keyring = "2.0.0"
once_cell = "1.17.1"
secrecy = "0.8.0"
indicatif = "0.17.11"
clap_complete = "4.5.47"
zeroize = { version = "1.8.1", features = ["derive"] }
rust_decimal = "1.37.1"

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "xcp"
path = "src/main.rs"

[[bin]]
name = "counterparty-client"
path = "src/main.rs"