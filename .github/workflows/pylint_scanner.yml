name: Pylint Scanner

on:
  push:
    branches: "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Pylint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      # Mitigate transient crates.io download failures ("Recv failure:
      # Connection reset by peer") by disabling cargo's HTTP/2 multiplexing
      # and bumping the network retry count.
      env:
        CARGO_NET_RETRY: "10"
        CARGO_HTTP_MULTIPLEXING: "false"
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade pylint pylint-sarif-unofficial
        cd counterparty-rs && pip install -e . && cd ..
        cd counterparty-core && pip install -e . && cd ..
    - name: Analysing the code with pylint
      run: |
        pylint2sarif $(git ls-files '*.py' | grep -v counterparty-rs/tests/ | grep -v counterparty-core/counterpartycore/test/ | grep -v counterparty-core/tools/) || true
    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif/@v2
      with:
        sarif_file: pylint.sarif
