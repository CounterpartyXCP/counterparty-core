name: Pytest Action

on:
  workflow_call:
    inputs:
      name:
        type: string
        default: "Pytest"
      python-version:
        type: string
        default: "3.11"
      os:
        type: string
        default: "ubuntu-22.04"
      test-path:
        type: string
        required: true
      install_bitcoin:
        type: boolean
        default: false
      only_on_develop:
        type: boolean
        default: false
      no_cov_report:
        type: boolean
        default: false
      integration_cache_network:
        type: string
        default: ""
        description: "Network for integration test caching (signet, testnet4). Leave empty to disable caching."

jobs:
  pytest:
    name: ${{ inputs.name }}
    runs-on: ${{ inputs.os }}
    if: ${{ !inputs.only_on_develop || github.ref == 'refs/heads/develop' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore integration cache
        if: inputs.integration_cache_network != ''
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/counterparty-integration-cache/${{ inputs.integration_cache_network }}
          # Cache key version: increment to invalidate incompatible caches
          # v5: addresses normalized to a compact `address_id` FK (`address_list`)
          # and `utxo` TEXT split into `(utxo_tx_hash BLOB, utxo_vout)`, folded
          # into migration 0010. yoyo never re-applies an already-applied 0010,
          # so v4 cached DBs lack `address_list`/the split utxo columns and the
          # state migration 0004 then fails with `no such table: ledger_db.address_list`.
          # v4: asset names normalized to a compact `asset_index` FK, folded
          # into migration 0010. yoyo never re-applies an already-applied 0010,
          # so v3 cached DBs stay on the pre-`asset_index` schema and the state
          # migration 0004 then fails with `no such column: a.asset_index`.
          # v3: compact-hash match tables re-keyed on (tx0_index, tx1_index);
          # the v2 cached DBs carry the old TEXT `id` schema and are incompatible.
          key: integration-v5-${{ inputs.integration_cache_network }}-${{ github.run_id }}
          restore-keys: |
            integration-v5-${{ inputs.integration_cache_network }}-

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          default: true

      - name: Install dependencies
        run: |
          pip install --upgrade pytest hatchling hatch pytest-cov coveralls

      - name: Install Bitcoin & Electrs
        if: inputs.install_bitcoin
        run: |
          wget https://bitcoincore.org/bin/bitcoin-core-28.0/bitcoin-28.0-x86_64-linux-gnu.tar.gz
          tar -xvf bitcoin-28.0-x86_64-linux-gnu.tar.gz
          sudo cp bitcoin-28.0/bin/bitcoin-cli /usr/local/bin/bitcoin-cli
          sudo cp bitcoin-28.0/bin/bitcoind /usr/local/bin/bitcoind
          sudo cp bitcoin-28.0/bin/bitcoin-wallet /usr/local/bin/bitcoin-wallet
          git clone https://github.com/mempool/electrs && cd electrs
          # Pin electrs to a known commit: mempool/electrs publishes no releases, so
          # cloning the default branch tracked a moving target that could change under us.
          git checkout bf622e58bf0b1c01cb2f8ebb23cf35a98b41e67b
          rustup toolchain install nightly
          cargo +nightly update
          # Cap future-incompatibility lints to warnings. A recent nightly promoted
          # `semicolon_in_expressions_from_macros` to a hard error, which breaks the old
          # error-chain `bail!()` calls in electrs and fails the build. electrs is a
          # third-party binary we only run in tests, so downgrading the lint is safe.
          RUSTFLAGS='--cap-lints=warn' cargo +nightly install --path=.

      - name: Run tests
        # `BACKEND_API_KEY` (when defined as a repo/org secret) lifts the
        # per-IP rate-limit on the public signet/testnet4 RPC proxy from
        # 120 req/min to the premium 1000 req/min bucket, which is what
        # the bootstrap+catchup integration tests need to avoid hanging
        # on 429-induced retry loops in `getrawtransaction`.
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          cd counterparty-core
          hatch run pytest counterpartycore/test/${{ inputs.test-path }} \
            ${{ !inputs.no_cov_report && '-s -vv -x --cov=counterpartycore/lib --cov-report=term-missing --cov-report=' || '' }}
          if [ "${{ !inputs.no_cov_report }}" = "true" ]; then
            mv .coverage ../
          fi

      - name: Upload generated OpenAPI spec
        if: inputs.test-path == 'integrations/regtest/scenarios_test.py'
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json

      - name: Save integration cache
        if: always() && inputs.integration_cache_network != ''
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/counterparty-integration-cache/${{ inputs.integration_cache_network }}
          # Cache key version: increment to invalidate incompatible caches
          # (must match the restore key above).
          key: integration-v5-${{ inputs.integration_cache_network }}-${{ github.run_id }}

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: CounterpartyXCP/counterparty-core
          flags: core